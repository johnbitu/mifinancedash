spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false

jwt.secret=01234567890123456789012345678901
jwt.expiration=3600000

security.trust-proxy=false
security.rate-limit.login.max-attempts=1000
security.rate-limit.login.window-seconds=60
security.rate-limit.register.max-attempts=1000
security.rate-limit.register.window-seconds=60
security.rate-limit.refresh.max-attempts=1000
security.rate-limit.refresh.window-seconds=60
security.rate-limit.cache-ttl-minutes=10
spring.flyway.enabled=false
