spring.application.name=finance
spring.profiles.default=dev

spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/myfinance}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:root}

jwt.secret=${JWT_SECRET}
jwt.expiration=${JWT_EXPIRATION:3600000}

security.trust-proxy=${SECURITY_TRUST_PROXY:false}
security.rate-limit.login.max-attempts=${RATE_LIMIT_LOGIN_MAX_ATTEMPTS:5}
security.rate-limit.login.window-seconds=${RATE_LIMIT_LOGIN_WINDOW_SECONDS:60}
security.rate-limit.register.max-attempts=${RATE_LIMIT_REGISTER_MAX_ATTEMPTS:3}
security.rate-limit.register.window-seconds=${RATE_LIMIT_REGISTER_WINDOW_SECONDS:60}
security.rate-limit.refresh.max-attempts=${RATE_LIMIT_REFRESH_MAX_ATTEMPTS:10}
security.rate-limit.refresh.window-seconds=${RATE_LIMIT_REFRESH_WINDOW_SECONDS:60}
security.rate-limit.cache-ttl-minutes=${RATE_LIMIT_CACHE_TTL_MINUTES:10}

security.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:3000}
security.cors.allowed-methods=${CORS_ALLOWED_METHODS:GET,POST,PUT,PATCH,DELETE,OPTIONS}
security.cors.allowed-headers=${CORS_ALLOWED_HEADERS:Authorization,Content-Type}

security.blacklist.max-size=${BLACKLIST_MAX_SIZE:10000}

spring.jpa.hibernate.ddl-auto=validate
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true
